<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Examiner Report</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            max-width: 700px;
            width: 100%;
            padding: 40px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #333;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
        }

        .thesis-info {
            background: #f8f9fa;
            border-left: 4px solid #667eea;
            padding: 20px;
            margin-bottom: 30px;
            border-radius: 5px;
        }

        .thesis-info h3 {
            color: #667eea;
            margin-bottom: 15px;
        }

        .thesis-info p {
            margin-bottom: 8px;
            color: #555;
        }

        .thesis-info strong {
            color: #333;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
        }

        .form-group label .required {
            color: #e74c3c;
        }

        .form-group select,
        .form-group textarea,
        .form-group input[type="file"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            font-family: inherit;
        }

        .form-group select:focus,
        .form-group textarea:focus,
        .form-group input[type="file"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 120px;
        }

        .recommendation-options {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 10px;
            margin-top: 10px;
        }

        .radio-option {
            position: relative;
        }

        .radio-option input[type="radio"] {
            position: absolute;
            opacity: 0;
        }

        .radio-option label {
            display: block;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
            font-weight: 500;
        }

        .radio-option input[type="radio"]:checked + label {
            border-color: #667eea;
            background: #f0f4ff;
            color: #667eea;
        }

        .radio-option label:hover {
            border-color: #667eea;
        }

        .file-upload {
            border: 2px dashed #ddd;
            border-radius: 5px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .file-upload:hover {
            border-color: #667eea;
            background: #f0f4ff;
        }

        .file-upload input[type="file"] {
            display: none;
        }

        .file-name {
            margin-top: 10px;
            color: #667eea;
            font-weight: 500;
        }

        .submit-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .alert {
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
        }

        .alert-error {
            background: #fee;
            border-left: 4px solid #e74c3c;
            color: #c0392b;
        }

        .alert-success {
            background: #efe;
            border-left: 4px solid #27ae60;
            color: #1e8449;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Examiner Report Submission</h1>
            <p>PhD Thesis Evaluation</p>
        </div>

        <div id="alert"></div>
        <div id="loading" class="loading">
            <div class="spinner"></div>
            <p style="margin-top: 10px;">Submitting report...</p>
        </div>

        <div id="formContainer">
            <div class="thesis-info" id="thesisInfo">
                <h3>Thesis Information</h3>
                <p><strong>Loading thesis details...</strong></p>
            </div>

            <form id="reportForm">
                <div class="form-group">
                    <label>
                        Recommendation <span class="required">*</span>
                    </label>
                    <div class="recommendation-options">
                        <div class="radio-option">
                            <input type="radio" id="accept" name="recommendation" value="accept" required>
                            <label for="accept">Accept</label>
                        </div>
                        <div class="radio-option">
                            <input type="radio" id="minor" name="recommendation" value="minor_revision">
                            <label for="minor">Minor Revision</label>
                        </div>
                        <div class="radio-option">
                            <input type="radio" id="major" name="recommendation" value="major_revision">
                            <label for="major">Major Revision</label>
                        </div>
                        <div class="radio-option">
                            <input type="radio" id="reject" name="recommendation" value="reject">
                            <label for="reject">Reject</label>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label for="comments">
                        Comments and Feedback <span class="required">*</span>
                    </label>
                    <textarea id="comments" name="comments" required placeholder="Provide detailed feedback on the thesis..."></textarea>
                </div>

                <div class="form-group">
                    <label>
                        Upload Report (PDF) <span class="required">*</span>
                    </label>
                    <div class="file-upload" onclick="document.getElementById('fileInput').click()">
                        <input type="file" id="fileInput" name="file" accept=".pdf" required>
                        <p>Click to select your evaluation report (PDF format)</p>
                        <p id="fileName" class="file-name"></p>
                    </div>
                </div>

                <button type="submit" class="submit-btn">Submit Evaluation Report</button>
            </form>
        </div>
    </div>

    <script>
        // Get token from URL
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        if (!token) {
            showAlert('Invalid access link. Token is missing.', 'error');
        }

        // Load thesis info
        async function loadThesisInfo() {
            // For now, show generic info
            document.getElementById('thesisInfo').innerHTML = `
                <h3>Thesis Information</h3>
                <p><strong>Status:</strong> Ready for evaluation</p>
                <p><strong>Deadline:</strong> Please submit your evaluation as soon as possible</p>
            `;
        }

        loadThesisInfo();

        // File input change
        document.getElementById('fileInput').addEventListener('change', function(e) {
            const fileName = e.target.files[0]?.name || '';
            document.getElementById('fileName').textContent = fileName ? `Selected: ${fileName}` : '';
        });

        // Form submission
        document.getElementById('reportForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const formData = new FormData(this);
            formData.append('token', token);

            // Show loading
            document.getElementById('loading').style.display = 'block';
            document.getElementById('formContainer').style.display = 'none';

            try {
                const response = await fetch('/api/thesis/public/examiner-report', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (response.ok) {
                    document.getElementById('loading').style.display = 'none';
                    showAlert('Report submitted successfully! Thank you for your evaluation.', 'success');
                    document.getElementById('formContainer').style.display = 'none';
                } else {
                    showAlert(data.error || 'Failed to submit report. Please try again.', 'error');
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('formContainer').style.display = 'block';
                }
            } catch (error) {
                showAlert('Network error. Please check your connection and try again.', 'error');
                document.getElementById('loading').style.display = 'none';
                document.getElementById('formContainer').style.display = 'block';
            }
        });

        function showAlert(message, type) {
            const alertDiv = document.getElementById('alert');
            alertDiv.className = `alert alert-${type}`;
            alertDiv.textContent = message;
            alertDiv.style.display = 'block';
        }
    </script>
</body>
</html>
